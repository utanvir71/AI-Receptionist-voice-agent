<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Receptionist Browser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
        }

        p {
            color: #444;
        }

        .buttons {
            margin-top: 20px;
        }

        button {
            padding: 12px 18px;
            margin-right: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .connect {
            background: #2563eb;
            color: white;
        }

        .call {
            background: #16a34a;
            color: white;
        }

        .hangup {
            background: #dc2626;
            color: white;
        }

        #statusBox {
            margin-top: 25px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            min-height: 120px;
            white-space: pre-wrap;
        }
    </style>

    <!-- Twilio Voice SDK -->
    <script src="/twilio.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>AI Receptionist Browser Test</h1>
        <p>This is the browser UI for your Twilio calling prototype.</p>

        <div class="buttons">
            <button class="connect" onclick="connectDevice()">Connect Device</button>
            <button class="call" onclick="makeCall()">Call</button>
            <button class="hangup" onclick="hangUp()">Hang Up</button>
        </div>

        <div id="statusBox">Status: Page loaded successfully.</div>
    </div>

    <script>
        let twilioToken = null;
        let device = null;
        let activeCall = null;

        function setStatus(message) {
            document.getElementById("statusBox").innerText = "Status: " + message;
        }

        async function connectDevice() {
            try {
                setStatus("Requesting Twilio token from backend...");

                const response = await fetch("/token");
                const data = await response.json();

                if (!response.ok) {
                    setStatus("Token fetch failed: " + (data.error || "unknown error"));
                    return;
                }

                if (!data.token) {
                    setStatus("No token received from backend.");
                    return;
                }

                twilioToken = data.token;

                setStatus("Token received. Creating Twilio Device...");

                device = new Twilio.Device(twilioToken, {
                    codecPreferences: ["opus", "pcmu"],
                    fakeLocalDTMF: true,
                    enableRingingState: true,
                    logLevel: 1
                });

                device.on("registered", function () {
                    setStatus("Twilio Device registered successfully. You can now make a browser call.");
                });

                device.on("error", function (error) {
                    setStatus("Twilio Device error: " + error.message);
                    console.error("Twilio Device error:", error);
                });

                device.on("incoming", function (call) {
                    activeCall = call;
                    setStatus("Incoming call detected. Accepting...");
                    call.accept();
                });

                device.on("tokenWillExpire", async function () {
                    try {
                        const response = await fetch("/token");
                        const data = await response.json();
                        if (data.token && device) {
                            device.updateToken(data.token);
                            setStatus("Twilio token refreshed.");
                        }
                    } catch (err) {
                        console.error("Token refresh failed:", err);
                    }
                });

                await device.register();

            } catch (error) {
                setStatus("Error while connecting device: " + error.message);
                console.error(error);
            }
        }

        async function makeCall() {
            try {
                if (!device) {
                    setStatus("No Twilio Device yet. Click Connect Device first.");
                    return;
                }

                setStatus("Starting browser call...");

                activeCall = await device.connect({
                    params: {
                        To: "browser-test"
                    }
                });

                activeCall.on("accept", function () {
                    setStatus("Call connected. Twilio is now executing your /voice webhook.");
                });

                activeCall.on("disconnect", function () {
                    setStatus("Call disconnected.");
                    activeCall = null;
                });

                activeCall.on("cancel", function () {
                    setStatus("Call cancelled.");
                    activeCall = null;
                });

                activeCall.on("reject", function () {
                    setStatus("Call rejected.");
                    activeCall = null;
                });

                activeCall.on("error", function (error) {
                    setStatus("Call error: " + error.message);
                    console.error("Call error:", error);
                });

            } catch (error) {
                setStatus("Error while making call: " + error.message);
                console.error(error);
            }
        }

        function hangUp() {
            if (activeCall) {
                activeCall.disconnect();
                setStatus("Hanging up active call...");
            } else if (device) {
                device.disconnectAll();
                setStatus("No active call found. Disconnecting all just in case.");
            } else {
                setStatus("Nothing to hang up.");
            }
        }
    </script>
</body>
</html>
